<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>청년문화예술패스 추천 챗봇 MVP</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --ink: #1b232c;
      --muted: #637181;
      --line: #d8dee7;
      --brand: #0f766e;
      --brand-dark: #0a5d57;
      --accent: #b85233;
      --soft: #e8f3f1;
      --soft-2: #fff5e8;
      --shadow: 0 12px 28px rgba(18, 28, 38, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      height: 100vh;
      padding: 22px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      flex-wrap: wrap;
    }

    .title {
      display: grid;
      gap: 5px;
      min-width: min(100%, 420px);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 25px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--muted);
      font-size: 13px;
      box-shadow: 0 4px 14px rgba(18, 28, 38, 0.04);
    }

    .stat strong {
      color: var(--ink);
    }

    .quick {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      border: 1px solid #aab6c4;
      border-radius: 999px;
      color: #14212d;
      background: #ffffff;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(18, 28, 38, 0.05);
    }

    .chip:hover {
      border-color: var(--brand);
      background: var(--soft);
      color: var(--brand-dark);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(330px, 400px);
      gap: 16px;
      min-height: 0;
      overflow: hidden;
    }

    .chat,
    .side-panel,
    .cart {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-height: 0;
    }

    .chat {
      display: grid;
      grid-template-rows: auto minmax(220px, 1fr) auto;
      overflow: hidden;
    }

    .chat-head {
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      background: #fbfcfd;
    }

    .chat-head h2,
    .side-panel h2,
    .cart h2 {
      font-size: 17px;
      letter-spacing: 0;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .messages {
      padding: 18px;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 14px;
      min-height: 0;
    }

    .message {
      max-width: 760px;
      border-radius: 8px;
      padding: 13px 14px;
      white-space: pre-wrap;
    }

    .bot {
      background: #edf4f3;
      border: 1px solid #d0e7e4;
    }

    .user {
      justify-self: end;
      background: #1f2b36;
      color: #ffffff;
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      background: #fbfcfd;
    }

    .composer input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px 13px;
      color: var(--ink);
      background: #ffffff;
      outline: none;
    }

    .composer input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .primary,
    .secondary,
    .ghost {
      border-radius: 6px;
      padding: 10px 12px;
      font-weight: 750;
    }

    .primary {
      border: 0;
      background: var(--brand);
      color: white;
    }

    .primary:hover {
      background: var(--brand-dark);
    }

    .secondary {
      border: 1px solid var(--brand);
      background: #ffffff;
      color: var(--brand-dark);
    }

    .secondary:hover {
      background: var(--soft);
    }

    .ghost {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--muted);
    }

    .ghost:hover {
      color: var(--ink);
      border-color: #aab6c4;
    }

    .right-column {
      display: grid;
      grid-template-rows: minmax(390px, 1.2fr) minmax(210px, 0.8fr);
      gap: 16px;
      min-height: 0;
      overflow: hidden;
    }

    .side-panel,
    .cart {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .panel-head {
      padding: 15px 16px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .panel-title {
      display: grid;
      gap: 3px;
    }

    .pager {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .pager button {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font-weight: 800;
    }

    .pager button:hover:not(:disabled) {
      border-color: var(--brand);
      color: var(--brand-dark);
      background: var(--soft);
    }

    .pager button:disabled {
      cursor: default;
      color: #b4bec9;
      background: #f4f6f8;
    }

    .page-indicator {
      min-width: 44px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .refresh-results {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font-weight: 850;
    }

    .refresh-results:hover {
      border-color: var(--brand);
      color: var(--brand-dark);
      background: var(--soft);
    }

    .card-list,
    .cart-list {
      padding: 14px;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 12px;
      min-height: 0;
    }

    .card,
    .cart-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      display: grid;
      gap: 9px;
      background: #ffffff;
    }

    .cart-item {
      position: relative;
      padding-right: 46px;
    }

    .card h3,
    .cart-item h3 {
      font-size: 15px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .meta {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--soft);
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 750;
    }

    .badge.hot {
      background: var(--soft-2);
      color: #895100;
    }

    .price {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      border-top: 1px solid var(--line);
      padding-top: 9px;
    }

    .price strong,
    .cart-total strong {
      color: var(--accent);
    }

    .card-actions,
    .cart-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .remove-item {
      position: absolute;
      top: 9px;
      right: 9px;
      width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--muted);
      font-weight: 850;
      line-height: 1;
    }

    .remove-item:hover {
      border-color: #c85d40;
      color: #9c3d28;
      background: #fff1ed;
    }

    a {
      color: var(--brand-dark);
      font-weight: 750;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 6px 2px;
    }

    .cart-total {
      border-top: 1px solid var(--line);
      padding: 12px 14px;
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
      background: #fbfcfd;
    }

    @media (max-width: 1040px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .right-column {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: minmax(360px, 1fr);
      }
    }

    @media (max-width: 720px) {
      .app {
        padding: 14px;
        overflow: auto;
      }

      body {
        overflow: auto;
      }

      .right-column,
      .composer {
        grid-template-columns: 1fr;
      }

      .stats {
        width: 100%;
      }

      .stat {
        flex: 1 1 140px;
      }
    }
  </style>
</head>

      </div>
      <div class="stats" aria-label="서비스 상태">

        <div class="stat">장바구니 <strong id="cartCount">0</strong>개</div>
      </div>
    </header>

    <section class="workspace">
      <section class="chat" aria-label="챗봇 대화">
        <div class="chat-head">
          <h2>채팅 내역</h2>
          <div class="quick" aria-label="빠른 입력">
            <button class="chip" data-prompt="서울에서 가볍게 볼 수 있는 연극 추천해줘">서울 연극</button>
            <button class="chip" data-prompt="20만원 안에서 뮤지컬이랑 전시를 같이 보고 싶어">뮤지컬 + 전시</button>
            <button class="chip" data-prompt="클래식 입문자에게 좋은 공연 알려줘">클래식 입문</button>
            <button class="chip" data-prompt="데이트로 보기 좋은 작품 추천해줘">데이트</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <form class="composer" id="chatForm">
          <input id="chatInput" placeholder="예: 서울에서 6월에 볼 연극이나 전시 추천해줘. 예산은 20만원이야." autocomplete="off" />
          <button class="primary" type="submit">전송</button>
        </form>
      </section>

      <div class="right-column">
        <section class="side-panel" aria-label="추천 후보">
          <div class="panel-head">
            <div class="panel-title">
              <h2>추천 후보</h2>
              <span class="hint" id="resultHint">최근 추천 기준</span>
            </div>
            <div class="pager" aria-label="추천 후보 페이지">
              <button class="refresh-results" id="refreshResults" type="button" aria-label="추천 후보 새로고침">↻</button>
              <button id="prevPage" type="button" aria-label="이전 추천 후보">‹</button>
              <span class="page-indicator" id="pageIndicator">1 / 1</span>
              <button id="nextPage" type="button" aria-label="다음 추천 후보">›</button>
            </div>
          </div>
          <div class="card-list" id="cards"></div>
        </section>

        <section class="cart" aria-label="장바구니">
          <div class="panel-head">
            <h2>장바구니</h2>
            <button class="ghost" id="clearCart" type="button">비우기</button>
          </div>
          <div class="cart-list" id="cartItems"></div>
          <div class="cart-total">
            <span>테스트 예상 합계 <strong id="cartTotal">0원</strong></span>
            <span>기본 예산 기준 남은 금액 <strong id="cartRemain">200,000원</strong></span>
          </div>
        </section>
      </div>
    </section>
  </div>

    function formatWon(value) {
      return `${Math.round(value).toLocaleString("ko-KR")}원`;
    }

    function formatDate(value) {
      return value.replaceAll("-", ".");
    }

    function daysUntil(startDate) {
      const start = new Date(`${startDate}T00:00:00+09:00`);
      return Math.ceil((start - today) / 86400000);
    }

    function includesWeekend(item) {
      const start = new Date(`${item.startDate}T00:00:00+09:00`);
      const end = new Date(`${item.endDate}T00:00:00+09:00`);
      for (let date = new Date(start); date <= end; date.setDate(date.getDate() + 1)) {
        const day = date.getDay();
        if (day === 0 || day === 6) return true;
      }
      return false;
    }

    function inferFromText(text) {
      const normalized = text.trim();
      const regions = ["서울", "경기·인천·강원", "대전·충청", "광주·전라", "대구·경북", "부산·경남", "제주"];
      const genres = ["뮤지컬", "연극", "전시", "클래식/오페라", "콘서트", "발레/무용", "국악"];
      const region = regions.find((item) => normalized.includes(item.split("·")[0]) || normalized.includes(item));
      const pickedGenres = genres.filter((item) => normalized.includes(item.split("/")[0]) || normalized.includes(item));
      const inferredRegion = region || (/[가-힣]+구/.test(normalized) ? "서울" : "");
      const styleRules = [
        { style: "코믹", words: ["코믹", "코미디", "웃긴", "웃기는", "유쾌", "재밌", "재미"] },
        { style: "가벼운", words: ["가볍", "부담", "편하게"] },
        { style: "로맨틱", words: ["로맨틱", "로맨스", "연애", "데이트"] },
        { style: "공포", words: ["공포", "무서", "스릴"] },
        { style: "입문", words: ["입문", "처음", "초심자"] },
        { style: "전시", words: ["전시", "미술", "그림"] }
      ];
      const styles = styleRules
        .filter((rule) => rule.words.some((word) => normalized.includes(word)))
        .map((rule) => rule.style);
      const budgetMatch = normalized.match(/(\d{1,3})(?:\s?만)\s?원?/);
      const budget = budgetMatch ? Number(budgetMatch[1]) * 10000 : defaultBudget;
      const dateRange = inferDateRange(normalized);
      const asksMore = /(더|다른|또|추가|말고).*(있|없|보여|추천|알려)|((있|없).*(더|다른|또))/.test(normalized);
      const asksList = /(어떤|뭐|목록|리스트|나열|열거|정리|쭉|있어|있나|보여|알려)/.test(normalized);
      const intent = asksMore ? "more" : asksList ? "list" : "recommend";

      return {
        region: inferredRegion,
        genres: pickedGenres,
        styles,
        budget,
        dateRange,
        tone: normalized,
        intent,
        hasBudget: Boolean(budgetMatch)
      };
    }

    function inferDateRange(text) {
      const wantsFall = text.includes("가을") || text.includes("선선") || text.includes("9월") || text.includes("10월") || text.includes("11월");
      const dislikesSummer = /여름.{0,12}(싫|더워|덥|피하|말고|아니|너무)/.test(text) || /(싫|더워|덥|피하|말고|아니).{0,12}여름/.test(text);
      const wantsSummer = (text.includes("여름") || text.includes("방학")) && !dislikesSummer;

      if (wantsFall) return "fall";
      if (text.includes("이번") || text.includes("곧")) return "soon";
      if (wantsSummer) return "summer";
      if (text.includes("주말")) return "weekend";
      return "";
    }

    function overlapsRange(item, startDate, endDate) {
      return item.startDate <= endDate && item.endDate >= startDate;
    }

    function scoreItem(item, criteria) {
      let score = 0;
      const tone = criteria.tone || "";
      const startGap = daysUntil(item.startDate);
      const keywordHits = item.mood.filter((keyword) => tone.includes(keyword)).length;
      const styleHits = criteria.styles.filter((style) => item.mood.includes(style) || item.genre.includes(style)).length;
      const actorHits = (criteria.actors || []).filter((actor) => (item.cast || []).includes(actor)).length;

      if (!criteria.region || item.region === criteria.region) score += 24;
      if (!criteria.genres.length || criteria.genres.includes(item.genre)) score += 22;
      if (item.estimatedPrice <= criteria.budget) score += 20;
      score += Math.min(item.discountRate, 50) / 2;
      score += keywordHits * 12;
      score += styleHits * 26;
      score += actorHits * 35;

      if (tone.includes("가볍") && item.mood.includes("가벼운")) score += 15;
      if (tone.includes("데이트") && item.mood.includes("데이트")) score += 15;
      if (tone.includes("혼자") && item.mood.includes("혼자")) score += 15;
      if (tone.includes("입문") && item.mood.includes("입문")) score += 15;
      if (tone.includes("가성비") && item.mood.includes("가성비")) score += 12;
      if (tone.includes("공포") && item.mood.includes("공포")) score += 12;
      if ((tone.includes("코믹") || tone.includes("코미디") || tone.includes("재밌") || tone.includes("웃긴")) && !item.mood.includes("코믹")) score -= 18;
      if ((tone.includes("무겁지") || tone.includes("가볍")) && item.mood.includes("진지한")) score -= 20;

      if (criteria.dateRange === "soon" && startGap >= 0 && startGap <= 30) score += 12;
      if (criteria.dateRange === "summer" && overlapsRange(item, "2026-06-20", "2026-08-31")) score += 12;
      if (criteria.dateRange === "fall" && overlapsRange(item, "2026-09-01", "2026-11-30")) score += 18;
      if (criteria.dateRange === "fall" && item.startDate >= "2026-09-01" && item.startDate <= "2026-11-30") score += 10;
      if (criteria.dateRange === "weekend" && includesWeekend(item)) score += 12;

      if (item.startDate < "2026-06-01" && item.endDate > "2026-11-30") score -= 8;

      return score;
    }

    function getRecommendations(criteria) {
      return sampleDb
        .filter((item) => item.endDate >= "2026-05-26")
        .filter((item) => !criteria.region || item.region === criteria.region)
        .filter((item) => !criteria.genres.length || criteria.genres.includes(item.genre))
        .filter((item) => !criteria.styles.length || criteria.styles.some((style) => item.mood.includes(style) || item.genre.includes(style)))
        .filter((item) => !criteria.actors.length || criteria.actors.some((actor) => (item.cast || []).includes(actor)))
        .filter((item) => !criteria.excludeIds || !criteria.excludeIds.includes(item.id))
        .filter((item) => item.estimatedPrice <= criteria.budget)
        .map((item) => ({ ...item, score: scoreItem(item, criteria) }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 6);
    }

    function buildBundle(items, budget) {
      const sorted = [...items].sort((a, b) => a.estimatedPrice - b.estimatedPrice);
      const bundle = [];
      let spent = 0;
      const usedGenres = new Set();

      for (const item of sorted) {
        if (spent + item.estimatedPrice > budget) continue;
        if (bundle.length >= 3) break;
        if (usedGenres.has(item.genre) && bundle.length > 0) continue;
        bundle.push(item);
        usedGenres.add(item.genre);
        spent += item.estimatedPrice;
      }

      return { bundle, spent };
    }

    function addMessage(role, text) {
      const node = document.createElement("div");
      node.className = `message ${role}`;
      node.textContent = text;
      elements.messages.appendChild(node);
      elements.messages.scrollTop = elements.messages.scrollHeight;
    }

    function buildAnswer(criteria, items) {
      if (!items.length) {
        const genreText = criteria.genres.length ? criteria.genres.join(", ") : "전체";
        const styleText = criteria.styles.length ? `, 분위기는 ${criteria.styles.join(", ")}` : "";
        return criteria.intent === "more"
          ? `지금 조건에서 앞서 보여준 후보를 제외하면 샘플 DB 안에는 더 남은 작품이 없어요.\n\n지역은 ${criteria.region || "전체"}, 장르는 ${genreText}${styleText}, 예산은 ${formatWon(criteria.budget)}로 보고 있습니다. 조건을 조금 넓히면 다른 후보를 다시 찾아볼 수 있어요.`
          : `조건을 조금 엄격하게 잡았더니 샘플 DB 안에서는 추천 후보가 없어요.\n\n지역은 ${criteria.region || "전체"}, 장르는 ${genreText}${styleText}, 예산은 ${formatWon(criteria.budget)}로 보았습니다. 지역이나 장르를 넓히면 다시 찾아볼 수 있어요.`;
      }

      const top = items[0];
      const genreText = criteria.genres.length ? criteria.genres.join(", ") : "장르 전체";
      const styleText = criteria.styles.length ? ` / ${criteria.styles.join(", ")} 분위기` : "";
      const dateText = criteria.dateRange === "fall" ? " / 가을 관람 선호" :
        criteria.dateRange === "summer" ? " / 여름 관람 선호" :
        criteria.dateRange === "soon" ? " / 가까운 일정 선호" :
        criteria.dateRange === "weekend" ? " / 주말 포함 선호" : "";
      const { bundle, spent } = buildBundle(items, criteria.budget);
      const bundleText = bundle.length > 1
        ? `\n\n예산 조합으로는 ${bundle.map((item) => `「${item.title}」`).join(" + ")}를 담으면 약 ${formatWon(spent)}입니다. 남는 예산은 약 ${formatWon(criteria.budget - spent)}예요.`
        : "";

      if (criteria.intent === "more") {
        const list = items.slice(0, 4).map((item) => `- 「${item.title}」: ${item.genre}, ${formatWon(item.estimatedPrice)}, ${formatDate(item.startDate)}부터`).join("\n");
        return `네, 앞서 본 후보 말고도 더 볼 만한 작품이 있습니다.\n\n${list}\n\n이 중에서는 「${top.title}」을 먼저 볼 만해요. ${criteria.styles.length ? `${criteria.styles.join(", ")} 분위기와 잘 맞고, ` : ""}예산도 ${formatWon(criteria.budget)} 안에 들어옵니다.`;
      }

      if (criteria.intent === "list") {
        const list = items.slice(0, 5).map((item) => `- 「${item.title}」 (${item.genre}, ${formatWon(item.estimatedPrice)})`).join("\n");
        return `조건에 맞는 후보를 목록으로 보면 이런 작품들이 있어요.\n\n${list}\n\n그중 추천 순위가 가장 높은 건 「${top.title}」입니다. ${top.mood.slice(0, 3).join(", ")} 쪽 취향과 잘 맞아서 먼저 띄웠어요.`;
      }

      return `가장 먼저 볼 만한 후보는 「${top.title}」입니다. ${top.genre}이고, ${top.venue}에서 ${formatDate(top.startDate)}부터 관람 가능해요. 테스트 예상가는 ${formatWon(top.estimatedPrice)}이라서 예산 안에 들어옵니다.\n\n이번 추천은 ${criteria.region || "전국"} / ${genreText}${styleText}${dateText} / ${formatWon(criteria.budget)} 기준으로 골랐어요. 실제 좌석 가격은 예매처에서 최종 확인이 필요합니다.${bundleText}`;
    }

    function renderPager(totalItems) {
      const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
      currentPage = Math.min(Math.max(currentPage, 1), totalPages);
      elements.pageIndicator.textContent = `${currentPage} / ${totalPages}`;
      elements.prevPage.disabled = currentPage <= 1;
      elements.nextPage.disabled = currentPage >= totalPages;
    }

    function renderCards(items) {
      currentRecommendations = items;
      renderPager(items.length);

      if (!items.length) {
        elements.cards.innerHTML = `<p class="empty">조건에 맞는 샘플 작품이 없습니다. 채팅창에서 지역이나 장르를 넓혀보세요.</p>`;
        return;
      }

      const visibleItems = items.slice((currentPage - 1) * pageSize, currentPage * pageSize);

      elements.cards.innerHTML = visibleItems.map((item) => {
        const soon = daysUntil(item.startDate) >= 0 && daysUntil(item.startDate) <= 14;
        const inCart = cart.includes(item.id);
        return `
          <article class="card">
            <div class="badges">
              <span class="badge">${item.genre}</span>
              <span class="badge">${item.region}</span>
              ${soon ? `<span class="badge hot">임박</span>` : ""}

              <span>${formatDate(item.startDate)} - ${formatDate(item.endDate)}</span>

            <div class="price">

    function renderCart() {
      const items = cart.map((id) => sampleDb.find((item) => item.id === id)).filter(Boolean);
      const total = items.reduce((sum, item) => sum + item.estimatedPrice, 0);

      elements.cartCount.textContent = items.length.toLocaleString("ko-KR");
      elements.cartTotal.textContent = formatWon(total);

    function resolveCriteria(rawCriteria) {
      const nextCriteria = {
        ...rawCriteria,
        region: lastCriteria.region || "",
        genres: [...(lastCriteria.genres || [])],
        styles: [...(lastCriteria.styles || [])],
        actors: [...(lastCriteria.actors || [])],
        budget: lastCriteria.budget || defaultBudget,
        dateRange: lastCriteria.dateRange || "",
        excludeIds: []
      };

      if (rawCriteria.clearsRegion) {
        nextCriteria.region = "";
      } else if (rawCriteria.region) {
        nextCriteria.region = rawCriteria.region;
      }

      if (rawCriteria.relaxesGenre) {
        nextCriteria.genres = rawCriteria.clearGenres.length
          ? nextCriteria.genres.filter((genre) => !rawCriteria.clearGenres.includes(genre))
          : [];
      } else if (rawCriteria.genres.length) {
        nextCriteria.genres = [...rawCriteria.genres];
      }

      if (rawCriteria.styles.length) {
        nextCriteria.styles = [...rawCriteria.styles];
      }

      if (rawCriteria.actors.length) {
        nextCriteria.actors = [...rawCriteria.actors];
      }

      if (rawCriteria.styles.length && rawCriteria.tone.includes("장르") && !rawCriteria.genres.length) {
        nextCriteria.genres = [];
      }

      if (rawCriteria.dateRange) {
        nextCriteria.dateRange = rawCriteria.dateRange;
      }

      if (rawCriteria.hasBudget) {
        nextCriteria.budget = rawCriteria.budget;
      }

      if (rawCriteria.intent === "more") {
        nextCriteria.excludeIds = [...lastShownIds];
      }

      if (matchedStyles.length) reasons.push(`${matchedStyles.join(", ")} 분위기 조건을 직접 만족합니다`);
      if (criteria.genres.includes(item.genre)) reasons.push(`요청한 ${item.genre} 장르에 정확히 맞습니다`);
      if (criteria.actors.some((actor) => (item.cast || []).includes(actor))) reasons.push("입력한 배우가 출연 후보에 포함되어 있습니다");
      if (criteria.dateRange === "fall" && overlapsRange(item, "2026-09-01", "2026-11-30")) reasons.push("가을 기간에 관람할 수 있습니다");
      if (item.mood.includes("가성비") || item.estimatedPrice <= 30000) reasons.push("가격 부담이 작아 예산을 아끼기 좋습니다");
      if (item.mood.includes("유명작")) reasons.push("인지도가 있는 작품이라 첫 관람 후보로 안정적입니다");
      if (item.mood.includes("참여형")) reasons.push("참여형 요소가 있어 관람 경험이 더 선명할 수 있습니다");
      if (item.mood.includes("영화음악")) reasons.push("익숙한 영화음악 중심이라 접근성이 좋습니다");
      if (item.rating && !reasons.some((reason) => reason.includes("가격"))) reasons.push(`테스트 평점 ${item.rating.toFixed(1)}점으로 만족도 기대치가 높습니다`);
      if (index === 0) reasons.push("조건 일치도가 가장 높아 1순위로 두었습니다");
      return [...new Set(reasons)].slice(0, 3).join(", ");
    }

    elements.chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = elements.chatInput.value.trim();
      if (!text) return;
      addMessage("user", text);
      elements.chatInput.value = "";
      runRecommendation(text);
    });

    document.querySelectorAll("[data-prompt]").forEach((button) => {
      button.addEventListener("click", () => {
        const prompt = button.dataset.prompt;
        addMessage("user", prompt);
        runRecommendation(prompt);
      });
    });

    elements.cards.addEventListener("click", (event) => {
      const button = event.target.closest("[data-add-cart]");
      if (!button) return;
      const id = button.dataset.addCart;
      if (!cart.includes(id)) cart.push(id);
      renderCart();
      renderCards(currentRecommendations);
    });

    elements.cartItems.addEventListener("click", (event) => {
      const button = event.target.closest("[data-remove-cart]");
      if (!button) return;
      cart = cart.filter((id) => id !== button.dataset.removeCart);
      renderCart();
      renderCards(currentRecommendations);
    });

    elements.clearCart.addEventListener("click", () => {
      cart = [];
      renderCart();
      renderCards(currentRecommendations);
    });

    elements.prevPage.addEventListener("click", () => {
      currentPage -= 1;
      renderCards(currentRecommendations);
    });

    elements.nextPage.addEventListener("click", () => {
      currentPage += 1;
      renderCards(currentRecommendations);
    });

    elements.refreshResults.addEventListener("click", () => {
      const items = getRecommendations(lastCriteria);
      currentPage = 1;
      updateResultHint(lastCriteria);
      renderCards(items);
      renderCart();
    });

    addMessage("bot", "안녕하세요. 보고 싶은 지역, 장르, 분위기, 예산을 편하게 말해주세요.\n\n예: 서울에서 가볍게 볼 연극 추천해줘 / 20만원 안에서 뮤지컬이랑 전시 같이 보고 싶어");
    renderInitialEmptyState();
    renderCart();
  </script>
</body>
</html>
